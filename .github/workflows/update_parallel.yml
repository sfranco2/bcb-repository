name: Update Parallel Rate

on:
  schedule:
    # Every day at 12:00 UTC (08:00 Bolivia time, UTC-4)
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-parallel:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas

      - name: Fetch parallel exchange rate
        run: python scripts/fetch_parallel.py

      - name: Commit and push if data changed
        run: |
          git config user.name  "BCB Dashboard Bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/parallel.json
          if git diff --staged --quiet; then
            echo "No changes to commit — parallel rate is already up to date."
          else
            git commit -m "chore: update parallel rate $(date -u +'%Y-%m-%d')"
            git pull --rebase
            git push
          fi
