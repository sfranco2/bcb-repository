name: Update Inflation Data

on:
  schedule:
    # 16th of every month at 12:00 UTC (08:00 Bolivia time, UTC-4)
    # INE publishes around the 15th each month
    - cron: '0 12 16 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-inflation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas openpyxl

      - name: Fetch inflation data
        run: python scripts/fetch_inflation.py

      - name: Commit and push if data changed
        run: |
          git config user.name  "BCB Dashboard Bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/inflation.json
          if git diff --staged --quiet; then
            echo "No changes to commit — inflation data is already up to date."
          else
            git commit -m "chore: update inflation data $(date -u +'%Y-%m-%d')"
            git pull --rebase
            git push
          fi
