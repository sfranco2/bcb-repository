name: Update Balance of Payments Data

on:
  schedule:
    # 6th of February, May, August, November at 12:00 UTC (08:00 Bolivia time)
    - cron: '0 12 6 2,5,8,11 *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-bop:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas openpyxl

      - name: Fetch BOP data
        run: python scripts/fetch_bop.py

      - name: Commit and push if data changed
        run: |
          git config user.name  "BCB Dashboard Bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/bop.json
          if git diff --staged --quiet; then
            echo "No changes to commit — BOP data is already up to date."
          else
            git commit -m "chore: update BOP data $(date -u +'%Y-%m-%d')"
            git pull --rebase
            git push
          fi
